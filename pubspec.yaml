name: wael_mcp
description: A new Flutter project.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.6
  http: ^1.2.0
  device_info_plus: ^10.1.0
  shared_preferences: ^2.2.2
  flutter_animate: ^4.3.0
  google_fonts: ^6.1.0
  shimmer: ^3.0.0
  animated_text_kit: ^4.2.2
  lottie: ^3.1.0
  icons_plus: ^5.0.0
  supabase_flutter: ^2.12.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

# --- قسم Flutter الموحد ---
flutter:
  uses-material-design: true

  # تعريف الأصول (Assets)
  # استخدام اسم المجلد '/' يضمن تضمين جميع الملفات الموجودة بداخله
  assets:
    - assets/

